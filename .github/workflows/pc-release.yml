name: Build PC Client

on:
  push:
    branches: [ main ]
    paths:
      - 'anime-matcher-pc/**'
      - 'src/**'
      - '.github/workflows/pc-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read-version.outputs.version }}
      should-release: ${{ steps.check-release.outputs.should-release }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: read-version
        run: |
          VERSION=$(cat anime-matcher-pc/VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📋 当前版本号: $VERSION"

      - name: Check if release already exists
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.read-version.outputs.version }}"
          TAG="v${VERSION}"
          echo "🔍 检查 tag $TAG 是否已存在..."
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "⚠️  版本 $TAG 已存在，跳过本次发版"
            echo "should-release=false" >> $GITHUB_OUTPUT
          else
            echo "✅ 版本 $TAG 不存在，将进行发版"
            echo "should-release=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # 安装主项目核心包 (recognition_engine, recognition_service, anitopy)
          pip install -e .
          # 安装 PC 客户端依赖 (PyQt6, peewee, requests 等)
          pip install -r anime-matcher-pc/requirements.txt
          # 安装打包工具
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        working-directory: anime-matcher-pc
        run: |
          pyinstaller --noconfirm --onedir --windowed `
            --paths "." `
            --collect-submodules "recognition_service" `
            --collect-submodules "recognition_engine" `
            --collect-submodules "anitopy" `
            --collect-all "zhconv" `
            --collect-all "cn2an" `
            --hidden-import "regex" `
            --hidden-import "httpx" `
            --name "AnimeProRenamer" `
            main.py

      - name: Package Release
        shell: bash
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          echo "TAG=$TAG" >> $GITHUB_ENV

          # 组装发布目录 (EXE + data 占位)
          mkdir -p release/AnimeProRenamer
          cp -r anime-matcher-pc/dist/AnimeProRenamer/* release/AnimeProRenamer/
          mkdir -p release/AnimeProRenamer/data

          cd release
          powershell "Compress-Archive -Path AnimeProRenamer -DestinationPath ../AnimeProRenamer_${TAG}_Win64.zip"

      - name: Create Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ env.TAG }} -m "PC Client Release ${{ env.TAG }}"
          git push origin ${{ env.TAG }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: AnimeProRenamer ${{ env.TAG }}
          files: AnimeProRenamer_${{ env.TAG }}_Win64.zip
          body: |
            ## 🚀 AnimeProRenamer ${{ env.TAG }}

            由 GitHub Actions 自动编译生成的 Windows 桌面发行版本。

            ### ✨ 版本特性
            - **内置 Pipeline 引擎**: 直接调用 `recognition_service` 五阶段流水线，无需额外下载内核
            - **环境自持**: 已打入 `zhconv`, `cn2an`, `regex`, `httpx`, `PyQt6` 等全部依赖，解压即用
            - **功能对齐**: 与主项目 API 字段、日志格式、规则系统完全一致

            ### 📦 使用方式
            1. 下载并解压 `AnimeProRenamer_${{ env.TAG }}_Win64.zip`
            2. 进入 `AnimeProRenamer/` 目录
            3. 运行 `AnimeProRenamer.exe`
            4. 首次使用请在 **设置** 页签配置 TMDB API Key

            ### 📝 变更摘要
            > ${{ github.event.head_commit.message }}

            ### 🛠️ 构建详情
            - **版本号**: `${{ needs.check-version.outputs.version }}`
            - **构建时间**: `${{ github.event.head_commit.timestamp }}`
            - **流水线 ID**: `${{ github.run_number }}`
            - **目标平台**: Windows x64 (10/11)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
